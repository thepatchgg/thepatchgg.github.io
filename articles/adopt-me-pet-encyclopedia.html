<style>
:root{--bg:#0d0d0f;--surface:#16161a;--surface2:#1e1e24;--border:rgba(255,255,255,0.07);--accent:#c8ff57;--text:#e8e8f0;--muted:#888;--c:#9ca3af;--u:#4ade80;--r:#60a5fa;--ur:#c084fc;--l:#fbbf24}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;min-height:100vh}
.page-header{background:var(--surface);border-bottom:1px solid var(--border);padding:20px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.page-header h1{font-size:1.4rem;font-weight:800;color:#fff}
.page-header h1 span{color:var(--accent)}
.breadcrumb{font-size:12px;color:var(--muted)}
.breadcrumb a{color:var(--muted);text-decoration:none}
.breadcrumb a:hover{color:var(--accent)}
.controls{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;flex-wrap:wrap;gap:12px;align-items:center;position:sticky;top:0;z-index:100}
.search-wrap{position:relative;flex:1;min-width:200px;max-width:360px}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--muted)}
#search{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 12px 9px 36px;color:var(--text);font-size:14px;outline:none;transition:border-color .2s}
#search:focus{border-color:rgba(200,255,87,0.4)}
#search::placeholder{color:var(--muted)}
.filter-group{display:flex;gap:8px;flex-wrap:wrap}
select{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px;outline:none;cursor:pointer;transition:border-color .2s}
select:focus{border-color:rgba(200,255,87,0.4)}
.count-badge{font-size:13px;color:var(--muted);margin-left:auto;white-space:nowrap}
.count-badge strong{color:var(--accent)}
.rarity-pills{padding:12px 24px;display:flex;gap:8px;flex-wrap:wrap;border-bottom:1px solid var(--border)}
.rarity-pill{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid transparent;transition:all .15s;user-select:none}
.rarity-pill.active,.rarity-pill:hover{opacity:1}
.rarity-pill:not(.active){opacity:.5}
.rarity-pill[data-r="all"]{border-color:rgba(255,255,255,0.2);color:#fff}
.rarity-pill[data-r="all"].active{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.4)}
.rarity-pill[data-r="c"]{border-color:var(--c);color:var(--c)}
.rarity-pill[data-r="c"].active{background:rgba(156,163,175,0.12)}
.rarity-pill[data-r="u"]{border-color:var(--u);color:var(--u)}
.rarity-pill[data-r="u"].active{background:rgba(74,222,128,0.1)}
.rarity-pill[data-r="r"]{border-color:var(--r);color:var(--r)}
.rarity-pill[data-r="r"].active{background:rgba(96,165,250,0.1)}
.rarity-pill[data-r="ur"]{border-color:var(--ur);color:var(--ur)}
.rarity-pill[data-r="ur"].active{background:rgba(192,132,252,0.1)}
.rarity-pill[data-r="l"]{border-color:var(--l);color:var(--l)}
.rarity-pill[data-r="l"].active{background:rgba(251,191,36,0.1)}
.dot{width:7px;height:7px;border-radius:50%;background:currentColor;display:inline-block}
.grid-container{padding:20px 24px}
.pet-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px}
.pet-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;display:flex;flex-direction:column;align-items:center;padding:14px 10px 12px;text-align:center;transition:transform .15s,border-color .15s;position:relative;text-decoration:none;color:inherit}
.pet-card:hover{transform:translateY(-2px);border-color:rgba(255,255,255,0.14)}
.pet-card[data-r="l"]{border-color:rgba(251,191,36,0.18)}
.pet-card[data-r="ur"]{border-color:rgba(192,132,252,0.15)}
.pet-img-wrap{width:72px;height:72px;border-radius:8px;overflow:hidden;background:var(--surface2);display:flex;align-items:center;justify-content:center;margin-bottom:10px;flex-shrink:0}
.pet-img-wrap img{width:72px;height:72px;object-fit:contain}
.pet-img-wrap .fallback{width:40px;height:40px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:#fff}
.pet-name{font-size:12px;font-weight:700;line-height:1.3;color:#e8e8f0;margin-bottom:6px;flex:1;display:flex;align-items:center;justify-content:center}
.rb{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:800;letter-spacing:.6px;text-transform:uppercase}
.rb-c{background:rgba(156,163,175,0.15);color:var(--c)}
.rb-u{background:rgba(74,222,128,0.12);color:var(--u)}
.rb-r{background:rgba(96,165,250,0.12);color:var(--r)}
.rb-ur{background:rgba(192,132,252,0.12);color:var(--ur)}
.rb-l{background:rgba(251,191,36,0.12);color:var(--l)}
.wiki-link{position:absolute;top:6px;right:6px;width:20px;height:20px;border-radius:4px;background:rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:center;color:var(--muted);text-decoration:none;font-size:10px;transition:background .15s}
.wiki-link:hover{background:rgba(200,255,87,0.15);color:var(--accent)}
.empty-state{text-align:center;padding:80px 20px;color:var(--muted)}
.empty-state .big{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:15px}
@media(max-width:600px){
  .pet-grid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px}
  .controls{padding:12px 16px}
  .rarity-pills{padding:10px 16px}
  .grid-container{padding:16px}
}
</style>

const R_LABEL = {c:"Common",u:"Uncommon",r:"Rare",ur:"Ultra-Rare",l:"Legendary"};
const R_ORDER = {c:0,u:1,r:2,ur:3,l:4};
const IMG_BASE = "https://static.wikia.nocookie.net/adoptme/images/";
const IMG_SFX  = "/revision/latest/scale-to-width-down/80";
const FALLBACK_EMOJI = {c:"🐾",u:"🐾",r:"⭐",ur:"💜",l:"👑"};
const RARITY_HEX = {c:"#9ca3af",u:"#4ade80",r:"#60a5fa",ur:"#c084fc",l:"#fbbf24"};

let activeRarity = "all";
let searchTerm = "";
let sortMode = "alpha";

function wikiSlug(name){
  return encodeURIComponent(name.replace(/ /g,"_"));
}

function imgSrc(name){
  // Construct a reasonable wiki file path from pet name
  const slug = name.replace(/ /g,"_").replace(/\(Pet\)/g,"").replace(/[()]/g,"").replace(/__/g,"_").replace(/_$/,"");
  return IMG_BASE + slug.charAt(0).toLowerCase() + "/" + slug.substring(0,2).toLowerCase() + "/" + slug + ".png" + IMG_SFX;
}

function fallbackImg(card, rarity){
  const wrap = card.querySelector(".pet-img-wrap");
  const emoji = FALLBACK_EMOJI[rarity] || "🐾";
  const color = RARITY_HEX[rarity] || "#888";
  wrap.innerHTML = '<div class="fallback" style="background:' + color.replace('#','rgba(').split('').join('') + '22">' + emoji + '</div>';
}

function buildCard(pet){
  const {n, r} = pet;
  const label = R_LABEL[r] || r;
  const wikiUrl = "https://adoptme.fandom.com/wiki/" + wikiSlug(n);
  const div = document.createElement("a");
  div.className = "pet-card";
  div.setAttribute("data-r", r);
  div.setAttribute("data-name", n.toLowerCase());
  div.href = wikiUrl;
  div.target = "_blank";
  div.rel = "noopener";

  const imgSlug = n.replace(/ /g,"_").replace(/[()]/g,"").replace(/__/g,"_").replace(/_$/,"");
  const src = "https://adoptme.fandom.com/wiki/Special:FilePath/" + encodeURIComponent(imgSlug) + ".png";

  div.innerHTML =
    '<div class="pet-img-wrap">' +
      '<img src="' + src + '" alt="' + n + '" loading="lazy" onerror="this.style.display='none';this.parentNode.innerHTML='<div class=\"fallback\" style=\"background:rgba(100,100,100,0.2);font-size:22px;width:100%;height:100%;display:flex;align-items:center;justify-content:center\">' + FALLBACK_EMOJI[r] + '</div>'">' +
    '</div>' +
    '<div class="pet-name">' + n + '</div>' +
    '<span class="rb rb-' + r + '">' + label + '</span>';
  return div;
}

const grid = document.getElementById("pet-grid");
const emptyEl = document.getElementById("empty");
const shownCountEl = document.getElementById("shown-count");
const searchEl = document.getElementById("search");
const sortEl = document.getElementById("sort");

// Pre-build all cards
const allCards = PETS.map(buildCard);
allCards.forEach(c => grid.appendChild(c));

// Update rarity pill counts
const counts = {c:0,u:0,r:0,ur:0,l:0,all:718};
PETS.forEach(p => counts[p.r]++);
["c","u","r","ur","l"].forEach(r => {
  const el = document.getElementById("cnt-" + r);
  if(el) el.textContent = "(" + counts[r] + ")";
});

function render(){
  const term = searchTerm.toLowerCase();
  let shown = 0;
  const sorted = [...allCards];

  if(sortMode === "rarity-desc"){
    sorted.sort((a,b) => {
      const ra = R_ORDER[a.getAttribute("data-r")]||0;
      const rb = R_ORDER[b.getAttribute("data-r")]||0;
      return rb - ra || a.getAttribute("data-name").localeCompare(b.getAttribute("data-name"));
    });
  } else if(sortMode === "rarity-asc"){
    sorted.sort((a,b) => {
      const ra = R_ORDER[a.getAttribute("data-r")]||0;
      const rb = R_ORDER[b.getAttribute("data-r")]||0;
      return ra - rb || a.getAttribute("data-name").localeCompare(b.getAttribute("data-name"));
    });
  }

  grid.innerHTML = "";
  sorted.forEach(card => {
    const r = card.getAttribute("data-r");
    const name = card.getAttribute("data-name");
    const matchR = activeRarity === "all" || r === activeRarity;
    const matchS = !term || name.includes(term);
    if(matchR && matchS){
      card.style.display = "";
      grid.appendChild(card);
      shown++;
    }
  });

  shownCountEl.textContent = shown;
  emptyEl.style.display = shown === 0 ? "block" : "none";
}

function setRarity(r){
  activeRarity = r;
  document.querySelectorAll(".rarity-pill").forEach(p => p.classList.toggle("active", p.getAttribute("data-r") === r));
  render();
}

searchEl.addEventListener("input", e => { searchTerm = e.target.value; render(); });
sortEl.addEventListener("change", e => { sortMode = e.target.value; render(); });

render();
</script>
