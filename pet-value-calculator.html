*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d0d0f;--surface:#16161a;--surface2:#1e1e24;--border:#2a2a35;
  --text:#e8e8f0;--text-muted:#888898;--accent:#c8ff57;--accent-dim:rgba(200,255,87,.12);
  --red:#f85149;--green:#3fb950;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  --radius:8px;--max-w:1120px;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);line-height:1.6;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}

/* HEADER */
.site-header{position:sticky;top:0;z-index:100;background:rgba(13,13,15,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 20px}
.header-inner{max-width:var(--max-w);margin:0 auto;height:60px;display:flex;align-items:center;justify-content:space-between;gap:24px}
.site-logo{font-size:20px;font-weight:800;letter-spacing:-.5px;color:var(--accent);white-space:nowrap}
.site-logo span{color:var(--text)}
.main-nav{display:flex;gap:4px}
.main-nav a{font-size:14px;font-weight:500;color:var(--text-muted);padding:6px 12px;border-radius:var(--radius);transition:color .15s,background .15s}
.main-nav a:hover{color:var(--text);background:var(--surface2)}
.main-nav a.active{color:var(--accent)}
.header-cta{background:var(--accent);color:#0d0d0f;font-size:13px;font-weight:700;padding:7px 16px;border-radius:20px;white-space:nowrap;transition:opacity .15s}
.header-cta:hover{opacity:.88}
.nav-toggle{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:4px}
.nav-toggle span{display:block;width:22px;height:2px;background:var(--text);border-radius:2px}

/* PAGE HERO */
.page-hero{max-width:var(--max-w);margin:0 auto;padding:28px 20px 14px}
.page-hero h1{font-size:1.7rem;font-weight:800;margin-bottom:4px}
.page-hero p{color:var(--text-muted);font-size:.88rem}

/* CALC LAYOUT */
.calc-wrap{max-width:var(--max-w);margin:0 auto;padding:0 20px 60px;display:grid;grid-template-columns:1fr 210px 1fr;gap:14px;align-items:start}

/* TRADE PANEL */
.trade-panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.panel-head{padding:12px 16px;font-weight:700;font-size:.85rem;text-transform:uppercase;letter-spacing:.07em;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.panel-head.give{color:#58a6ff}
.panel-head.recv{color:#3fb950}
.panel-count{color:var(--text-muted);font-size:.72rem;font-weight:400;margin-left:auto}
.trade-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:10px}

/* SLOTS */
.slot{aspect-ratio:1;background:var(--surface2);border:1.5px dashed var(--border);border-radius:10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;transition:border-color .15s,background .15s;overflow:hidden;min-height:88px}
.slot.empty:hover{border-color:var(--accent);background:rgba(200,255,87,.04)}
.slot-empty-icon{font-size:1.6rem;color:var(--text-muted);opacity:.35;line-height:1}
.slot-empty-lbl{font-size:.58rem;color:var(--text-muted);opacity:.45;margin-top:2px}
.slot.filled{border-style:solid;border-color:var(--border);cursor:default;padding:5px 4px;gap:3px;justify-content:flex-start}
.slot-img{width:46px;height:46px;object-fit:contain;flex-shrink:0}
.slot-name{font-size:.56rem;font-weight:600;color:var(--text);text-align:center;width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.2}
.slot-val{font-size:.62rem;color:var(--accent);font-weight:700;line-height:1}
.slot-toggles{display:flex;flex-direction:column;gap:2px;width:100%}
.tog-row{display:flex;gap:2px;justify-content:center}
.tog{padding:1px 3px;border-radius:4px;border:1px solid var(--border);font-size:.5rem;background:transparent;color:var(--text-muted);cursor:pointer;transition:all .1s;white-space:nowraw;line-height:1.4}
.tog.sel{border-color:var(--accent);background:var(--accent-dim);color:var(--accent)}
.slot-remove{position:absolute;top:3px;right:3px;background:rgba(248,81,73,.12);border:1px solid rgba(248,81,73,.3);color:var(--red);cursor:pointer;font-size:.6rem;border-radius:4px;padding:1px 4px;line-height:1;transition:opacity .15s;opacity:0}
.slot.filled:hover .slot-remove{opacity:1}

/* VERDICT */
.verdict-panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 12px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:10px}
.vbar{display:flex;gap:5px;justify-content:center}
.vbar-item{padding:3px 9px;border-radius:12px;font-size:.62rem;font-weight:700;letter-spacing:.06em;transition:all .2s}
.vbar-win{color:var(--green)}
.vbar-fair{color:var(--text-muted)}
.vbar-lose{color:var(--red)}
.vbar-active{background:rgba(255,255,255,.1);color:var(--text)!important}
.verdict-label{font-size:.92rem;font-weight:800;letter-spacing:.03em;padding:6px 14px;border-radius:20px;transition:all .3s}
.verdict-pts{font-size:2.2rem;font-weight:900;line-height:1;transition:all .3s}
.verdict-sub{font-size:.65rem;color:var(--text-muted)}
.balance-wrap{width:100%;height:7px;background:var(--surface2);border-radius:4px;overflow:hidden;position:relative}
.balance-fill{position:absolute;height:100%;background:var(--accent);border-radius:4px;transition:all .4s;width:0}
.trade-totals{display:flex;justify-content:space-between;width:100%;font-size:.68rem;color:var(--text-muted)}
.clear-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text-muted);border-radius:8px;padding:7px 14px;font-size:.76rem;cursor:pointer;transition:all .15s;width:100%}
.clear-btn:hover{border-color:var(--red);color:var(--red)}
.verdict-note{font-size:.55rem;color:var(--text-muted)}

/* VERDICT COLORS */
.vHUGEWIN{color:#1b5e20;background:rgba(27,94,32,.15)}
.vBIGWIN{color:#2e7d32;background:rgba(46,125,50,.15)}
.vWIN{color:#388e3c;background:rgba(56,142,60,.15)}
.vSLIGHTWIN{color:#66bb6a;background:rgba(102,187,106,.15)}
.vFAIR{color:var(--text-muted);background:var(--surface2)}
.vSLIGHTLOSS{color:#ef9a9a;background:rgba(239,154,154,.1)}
.vLOSS{color:#e53935;background:rgba(229,57,53,.1)}
.vBIGLOSS{color:#c62828;background:rgba(198,40,40,.1)}
.vHUGELOSS{color:#b71c1c;background:rgba(183,28,28,.1)}

/* PET PICKER MODAL */
.picker-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.picker-overlay[hidden]{:display:none!important}
.picker-modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;width:min(540px,95vw);max-height:82vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,.6)}
.picker-top{display:flex;align-items:center;gap:10px;padding:14px 14px 10px;border-bottom:1px solid var(--border)}
.picker-top h3{font-size:.9rem;font-weight:700;white-space:nowrap}
.picker-search{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:7px 12px;font-size:.85rem;outline:none;min-width:0}
.picker-search:focus{border-color:var(--accent)}
.picker-close{background:var(--surface2);border:1px solid var(--border);color:var(--text-muted);cursor:pointer;font-size:.82rem;border-radius:6px;padding:6px 11px;flex-shrink:0;transition:all .15s}
.picker-close:hover{color:var(--text);border-color:var(--text-muted)}
.picker-filters{display:flex;gap:6px;padding:10px 14px;flex-wrap:wrap;border-bottom:1px solid var(--border)}
.f-btn{padding:4px 12px;border-radius:16px;border:1px solid var(--border);font-size:.73rem;background:transparent;color:var(--text-muted);cursor:pointer;transition:all .12s}
.f-btn.active{border-color:var(--accent);background:var(--accent-dim);color:var(--accent)}
.picker-grid-wrap{overflow-y:auto;flex:1}
.picker-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:12px14px}
.pet-tile{background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:8px 4px 6px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:all .12s}
.pet-tile:hover{border-color:var(--accent);background:rgba(200,255,87,.06);transform:translateY(-1px)}
.pet-tile img{width:52px;height:52px;object-fit:contain;border-radius:6px}
.pt-name{font-size:.58rem;font-weight:600;text-align:center;color:var(--text);line-height:1.2;width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pt-rar{font-size:.52rem;padding:1px 6px;border-radius:10px}
.r\{color:#ffd700;background:rgba(255,215,0,.12)}
.rUR{color:#b39ddb;background:rgba(179,157,219,.12)}
.rR{color:#4dd0e1;background:rgba(77,208,225,.12)}
.rUC{color:#81c784;background:rgba(129,199,132,.12)}
.r\{color:#bdbdbd;background:rgba(189,189,189,.12)}

@media(max-width:720px){
  .calc-wrap{grid-template-columns:1fr;padding:0 12px 40px}
  .picker-grid{grid-template-columns:repeat(4,1fr)}
  .main-nav,.header-cta{display:none}
}
</style>

var NEON_OPTS = [
  {label:"Normal", mult:1},
  {label:"Neon",   mult:4},
  {label:"Mega",   mult:16}
];
var FR_OPTS = [
  {label:"None",  mult:1},
  {label:"Fly",   mult:1.5},
  {label:"Ride",  mult:1.5},
  {label:"FR",    mult:2}
];
var VERDICTS = [
  {min:50,  cls:"vHUGEWIN",   label:"HUGE WIN"},
  {min:20,  cls:"vBIGWIN",    label:"BIG WIN"},
  {min:8,   cls:"vWIN",       label:"WIN"},
  {min:3,   cls:"vSLIGHTWIN", label:"SLIGHT WIN"},
  {min:-3,  cls:"vFAIR",      label:"FAIR TRADE"},
  {min:-8,  cls:"vSLIGHTLOSS",label:"SLIGHT LOSS"},
  {min:-20, cls:"vLOSS",      label:"LOSS"},
  {min:-50, cls:"vBIGLOSS",   label:"BIG LOSS"},
  {min:-1e9,cls:"vHUGELOSS",  label:"HUGE LOSS"}
];
var RARITY_LABELS = {L:"Legendary",UR:"Ultra-Rare",R:"Rare",UC:"Uncommon",C:"Common"};

// State
var givePets = newArr(), recvPets = newArr();
var activePicker = null; // {side, idx}
var pickerFilter = "all", pickerSearch = "";

function newArr(){ var a=[]; for(var i=0;i<SLOTS;i++) a.push(null); return a; }
function sideArr(side){ return side==="give" ? givePets : recvPets; }
function effVal(e){ return e.pet.val * e.neon.mult * e.fr.mult; }
function fmt(n){ return n%1===0 ? String(n) : n.toFixed(1); }

// -- RENDER SLOTS --
function renderSlots(side) {
  var arr = sideArr(side);
  var grid = document.getElementById(side+"-grid");
  while(grid.firstChild) grid.removeChild(grid.firstChild);

  for(var i=0; i<SLOTS; i++) {
    (function(idx){
      var entry = arr[idx];
      var slot = document.createElement("div");

      if(!entry) {
        slot.className = "slot empty";
        slot.setAttribute("data-side", side);
        slot.setAttribute("data-idx", idx);

        var icon = document.createElement("div");
        icon.className = "slot-empty-icon";
        icon.textContent = "+";
        var lbl = document.createElement("div");
        lbl.className = "slot-empty-lbl";
        lbl.textContent = "add pet";
        slot.appendChild(icon);
        slot.appendChild(lbl);
        slot.onclick = function(){ openPicker(side, idx); };
      } else {
        slot.className = "slot filled";

        // Remove btn
        var rm = document.createElement("button");
        rm.className = "slot-remove";
        rm.textContent = "X";
        rm.onclick = function(e){ e.stopPropagation(); removePet(side, idx); };
        slot.appendChild(rm);

        // Image
        var img = document.createElement("img");
        img.className = "slot-img";
        img.src = IMG_BASE + entry.pet.img + ".png";
        img.alt = entry.pet.name;
        img.loading = "lazy";
        img.onerror = function(){ this.style.opacity="0.25"; };
        slot.appendChild(img);

        // Name
        var nm = document.createElement("div");
        nm.className = "slot-name";
        nm.textContent = entry.pet.name;
        slot.appendChild(nm);

        // Value
        var vEl = document.createElement("div");
        vEl.className = "slot-val";
        vEl.textContent = fmt(effVal(entry)) + " pts";
        slot.appendChild(vEl);

        // Toggles
        var toggles = document.createElement("div");
        toggles.className = "slot-toggles";

        // Neon row
        var nRow = document.createElement("div");
        nRow.className = "tog-row";
        for(var ni=0; ni<NEON_OPTS.length; ni++) {
          (function(nIdx){
            var b = document.createElement("button");
            b.className = "tog" + (entry.neon===NEON_OPTS[nIdx] ? " sel" : "");
            b.textContent = NEON_OPTS[nIdx].label;
            b.onclick = function(e){ e.stopPropagation(); setNeon(side,idx,nIdx); };
            nRow.appendChild(b);
          })(ni);
        }
        toggles.appendChild(nRow);

        // FR row
        var fRow = document.createElement("div");
        fRow.className = "tog-row";
        for(var fi=0; fi<FR_OPTS.length; fi++) {
          (function(fIdx){
            var b = document.createElement("button");
            b.className = "tog" + (entry.fr===FR_OPTS[fIdx] ? " sel" : "");
            b.textContent = FR_OPTS[fIdx].label;
            b.onclick = function(e){ e.stopPropagation(); setFR(side,idx,fIdx); };
            fRow.appendChild(b);
          })(fi);
        }
        toggles.appendChild(fRow);
        slot.appendChild(toggles);
      }

      grid.appendChild(slot);
    })(i);
  }

  var filled = arr.filter(function(x){ return x!==null; }).length;
  document.getElementById(side+"-count").textContent = filled+(filled===1?" pet":" pets");
}

// -- PICKER --
function openPicker(side, idx) {
  activePicker = {side:side, idx:idx};
  pickerSearch = "";
  document.getElementById("picker-search").value = "";
  document.getElementById("picker").removeAttribute("hidden");
  document.getElementById("picker-search").focus();
  renderPickerGrid();
}

function closePicker() {
  document.getElementById("picker").setAttribute("hidden","");
  activePicker = null;
}

function renderPickerGrid() {
  var grid = document.getElementById("picker-grid");
  while(grid.firstChild) grid.removeChild(grid.firstChild);

  var q = pickerSearch.toLowerCase();
  var pets = PETS.filter(function(p){
    var matchR = pickerFilter==="all" || p.rarity===pickerFilter;
    var matchQ = !q || p.name.toLowerCase().indexOf(q) >= 0;
    return matchR && matchQ;
  });

  if(pets.length===0) {
    var msg = document.createElement("div");
    msg.style.cssText = "grid-column:1/-1;text-align:center;color:var(--text-muted);padding:24px;font-size:.8rem";
    msg.textContent = "No pets found";
    grid.appendChild(msg);
    return;
  }

  pets.forEach(function(p) {
    var tile = document.createElement("div");
    tile.className = "pet-tile";
    tile.onclick = function(){ selectPet(p); };

    var img = document.createElement("img");
    img.src = IMG_BASE + p.img + ".png";
    img.alt = p.name;
    img.loading = "lazy";
    img.width = 52; img.height = 52;
    img.onerror = function(){ this.style.opacity="0.2"; };
    tile.appendChild(img);

    var nm = document.createElement("div");
    nm.className = "pt-name";
    nm.textContent = p.name;
    tile.appendChild(nm);

    var rar = document.createElement("div");
    rar.className = "pt-rar r"+p.rarity;
    rar.textContent = RARITY_LABELS[p.rarity];
    tile.appendChild(rar);

    grid.appendChild(tile);
  });
}

function selectPet(pet) {
  if(!activePicker) return;
  var side = activePicker.side, idx = activePicker.idx;
  sideArr(side)[idx] = {pet:pet, neon:NEON_OPTS[0], fr:FR_OPTS[0]};
  closePicker();
  renderSlots(side);
  updateVerdict();
}

// -- MODIFY --
function removePet(side, idx) {
  sideArr(side)[idx] = null;
  renderSlots(side);
  updateVerdict();
}

function setNeon(side, idx, ni) {
  var e = sideArr(side)[idx];
  if(e){ e.neon=NEON_OPTS[ni]; renderSlots(side); updateVerdict(); }
}

function setFR(side, idx, fi) {
  var e = sideArr(side)[idx];
  if(e){ e.fr=FR_OPTS[fi]; renderSlots(side); updateVerdict(); }
}

function clearAll() {
  givePets=newArr(); recvPets=newArr();
  renderSlots("give"); renderSlots("recv"); updateVerdict();
}

// -- VERDICT --
function totalVal(arr) {
  return arr.filter(Boolean).reduce(function(s,e){ return s+effVal(e); }, 0);
}

function updateVerdict() {
  var gT = totalVal(givePets), rT = totalVal(recvPets);
  var diff = rT - gT;
  var v = VERDICTS[VERDICTS.length-1];
  for(var i=0;i<VERDICTS.length;i++){ if(diff>=VERDICTS[i].min){ v=VERDICTS[i]; break; } }

  var lbl = document.getElementById("v-label");
  lbl.className = "verdict-label "+v.cls;
  lbl.textContent = v.label;

  var pts = document.getElementById("v-pts");
  var sign = diff>0?"+":diff<0?"":"±";
  pts.textContent = sign + fmt(diff);
  pts.style.color = diff>0?"var(--green)":diff<0?"var(--red)":"var(--text-muted)";

  document.getElementById("v-give").textContent = "Give: "+fmt(gT);
  document.getElementById("v-recv").textContent = "Recv: "+fmt(rT);

  // Balance bar
  var bar = document.getElementById("v-bar");
  var tot = gT+rT;
  if(tot===0){
    bar.style.left="50%"; bar.style.width="0"; bar.style.background="var(--text-muted)";
  } else {
    var pct = Math.min(Math.max(rT/tot*100,2),98);
    if(diff>0){
      bar.style.left="50%"; bar.style.width=(pct-50)+"%"; bar.style.background="var(--green)";
    } else if(diff<0){
      bar.style.left=pct+"%"; bar.style.width=(50-pct)+"%"; bar.style.background="var(--red)";
    } else {
      bar.style.left="50%"; bar.style.width="0"; bar.style.background="var(--text-muted)";
    }
  }

  // Highlight verdict bar label
  ["win","fair","lose"].forEach(function(k){
    document.getElementById("vbar-"+k).classList.remove("vbar-active");
  });
  var hi = diff>3?"win": diff<-3?"lose":"fair";
  document.getElementById("vbar-"+hi).classList.add("vbar-active");
}

// -- EVENTS --
document.getElementById("picker-search").addEventListener("input", function(e){
  pickerSearch = e.target.value;
  renderPickerGrid();
});

document.getElementById("picker-filters").addEventListener("click", function(e){
  var btn = e.target.closest ? e.target.closest(".f-btn") : (e.target.classList.contains("f-btn")?e.target:null);
  if(!btn) return;
  pickerFilter = btn.getAttribute("data-r");
  var btns = document.querySelectorAll("#picker-filters .f-btn");
  for(var i=0;i<btns.length;i++) btns[i].classList.remove("active");
  btn.classLisById("vbar-"+k).classList.remove("vbar-active");

  document.getElementById("vbar-"+hi).classList.add("vbar-active");
}

document.getElementById("picker-search").addEventListener("input", function(e){
  pickerSearch = e.target.value;
  renderPickerGrid();
});

document.getElementById("picker-filters").addEventListener("click", function(e){
  var btn = e.target.closest ? e.target.closest(".f-btn") : (e.target.classList.contains("f-btn")?e.target:null);
  if(!btn) return;

  if(e.target===document.getElementById("picker")) closePicker();
});
document.getElementById("picker-close").addEventListener("click", closePicker);

// -- INIT --
renderSlots("give");

updateVerdict();
